name: TradeSphere CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 131315334386.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY_INGESTION: tradesphere-ingestion
  ECR_REPOSITORY_SPARK: tradesphere-spark

jobs:
  test:
    name: Run Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Python syntax
        run: |
          python -m py_compile validation/validate_data.py
          python -m py_compile ingestion/main.py
          python -m py_compile delta/delta_writer.py
          python -m py_compile spark/batch_transform.py
          python -m py_compile snowflake/snowflake_loader.py
          echo "All Python files syntax OK"

  build-and-push:
    name: Build and Push Docker Images to ECR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push ingestion image
        run: |
          docker build -f docker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_INGESTION:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_INGESTION:latest
          echo "Ingestion image pushed to ECR successfully"

      - name: Build and push spark image
        run: |
          docker build -f docker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_SPARK:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_SPARK:latest
          echo "Spark image pushed to ECR successfully"

  dbt-run:
    name: Run dbt Models
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Configure dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          tradesphere_dbt:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ACCOUNTADMIN
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                schema: STAGING
                threads: 1
          EOF

      - name: Run dbt models and tests
        run: |
          cd tradesphere_dbt
          dbt run --select staging
          dbt snapshot
          dbt run --select analytics
          dbt test

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: solapeajiboye@gmail.com
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "TradeSphere CI/CD Pipeline Ran Successfully"
          to: solapeajiboye@gmail.com
          from: solapeajiboye@gmail.com
          body: |
            CI/CD Pipeline ran successfully!

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}

            Steps completed:
            - Python syntax checks passed
            - Docker images built and pushed to AWS ECR
            - dbt models ran successfully
            - Super proud of you